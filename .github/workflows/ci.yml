name: ci

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BAZEL_REPO_CACHE_PATH: ~/.cache/bazel-repo
  BAZEL_DISK_CACHE_PATH: ~/.cache/bazel-disk

jobs:
  lint:
    name: format + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bazel-ci
        with:
          metadata-hash: ${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', '.bazelrc', '**/BUILD', '**/BUILD.bazel', '**/*.bzl', 'tools/downloader.cfg', 'tools/patches/**') }}
          repo-cache-path: ${{ env.BAZEL_REPO_CACHE_PATH }}
          disk-cache-path: ${{ env.BAZEL_DISK_CACHE_PATH }}

      - name: Prepare bazel-env
        run: |
          bazel run --config=ci //tools:bazel_env print-path >> "$GITHUB_PATH"

      - name: Format (must be clean)
        run: |
          format
          git diff --exit-code

      - name: Lint (clang-tidy)
        run: aspect lint --config=ci //...

  test_release:
    name: tests - ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - id: bazel-cache
        uses: ./.github/actions/setup-bazel-ci
        with:
          metadata-hash: ${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', '.bazelrc', '**/BUILD', '**/BUILD.bazel', '**/*.bzl', 'tools/downloader.cfg', 'tools/patches/**') }}
          repo-cache-path: ${{ env.BAZEL_REPO_CACHE_PATH }}
          disk-cache-path: ${{ env.BAZEL_DISK_CACHE_PATH }}

      - name: Tests
        run: |
          bazel test --config=ci //... \
            --test_output=errors --verbose_failures

      - name: Save Bazel repository cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.bazel-cache.outputs.repo-cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.BAZEL_REPO_CACHE_PATH }}
          key: ${{ steps.bazel-cache.outputs.repo-primary-key }}

      - name: Save Bazel disk cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.bazel-cache.outputs.disk-cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.BAZEL_DISK_CACHE_PATH }}
          key: ${{ steps.bazel-cache.outputs.disk-primary-key }}

  test_debug:
    name: tests (dbg) - ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bazel-ci
        with:
          metadata-hash: ${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', '.bazelrc', '**/BUILD', '**/BUILD.bazel', '**/*.bzl', 'tools/downloader.cfg', 'tools/patches/**') }}
          repo-cache-path: ${{ env.BAZEL_REPO_CACHE_PATH }}
          disk-cache-path: ${{ env.BAZEL_DISK_CACHE_PATH }}

      - name: Tests (dbg)
        run: |
          bazel test --config=ci -c dbg //... \
            --test_output=errors --verbose_failures

  sanitizers:
    name: tests (${{ matrix.cfg }}) - ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        cfg: [ asan, ubsan, tsan ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bazel-ci
        with:
          metadata-hash: ${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', '.bazelrc', '**/BUILD', '**/BUILD.bazel', '**/*.bzl', 'tools/downloader.cfg', 'tools/patches/**') }}
          repo-cache-path: ${{ env.BAZEL_REPO_CACHE_PATH }}
          disk-cache-path: ${{ env.BAZEL_DISK_CACHE_PATH }}

      - name: Tests (${{ matrix.cfg }})
        run: |
          bazel test --config=ci --config=${{ matrix.cfg }} //... \
            --test_output=errors --verbose_failures

  docs_build:
    name: docs (build)
    needs: [ test_release, test_debug, sanitizers ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bazel-ci
        with:
          metadata-hash: ${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', '.bazelrc', '**/BUILD', '**/BUILD.bazel', '**/*.bzl', 'tools/downloader.cfg', 'tools/patches/**') }}
          repo-cache-path: ${{ env.BAZEL_REPO_CACHE_PATH }}
          disk-cache-path: ${{ env.BAZEL_DISK_CACHE_PATH }}

      - name: Build Doxygen HTML
        run: bazel build --config=ci //docs:api_docs

      - name: Stage site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          rsync -a --no-perms bazel-bin/docs/html/ _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  docs_deploy:
    name: docs (deploy)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ docs_build ]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
